name: beon_otp_sdk
description: BeOn OTP SDK for Flutter — send, verify, and zero-tap auto-fill one-time passwords via Android SMS Retriever and iOS keyboard suggestions.
version: 1.0.0

topics:
  - otp
  - authentication
  - sms
  - autofill

environment:
  sdk: ^3.10.9
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.9.2
  equatable: ^2.0.8
  otp_autofill: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
